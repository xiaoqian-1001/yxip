name: Run All Workflows

on:
  schedule:
    - cron: '*/30 * * * *' # 每30分钟运行一次

jobs:
  trigger-all:
    name: Execute All Workflows
    runs-on: ubuntu-latest

    steps:
      # 步骤 1：检出仓库代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 步骤 2：找到 workflows 文件夹中所有的 YAML 文件
      - name: Find Workflows
        id: find_workflows
        run: |
          workflows=$(find .github/workflows -type f -name "*.yml")
          echo "${workflows}" > workflows.txt
          echo "::set-output name=workflows::${workflows}"

      # 步骤 3：逐个触发每一个工作流
      - name: Trigger Workflows
        run: |
          while IFS= read -r file; do
            echo "Triggering workflow $file..."
            gh workflow run "${file##*/}" || echo "Failed to trigger workflow"
          done < workflows.txt